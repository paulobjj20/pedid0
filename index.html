<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tenho uma pergunta importante...</title>
    <style>
        /* CONFIGURAÇÕES GLOBAIS (Fundo Rosa/Vermelho Romântico) */
        body {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #ff758c 0%, #ff7eb3 100%);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
        }

        /* CARD PRINCIPAL (Preto Elegante conforme os comentários) */
        .card-pedido {
            background-color: #1a1a1a;
            color: #ffffff;
            padding: 40px 30px;
            border-radius: 20px;
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.4);
            text-align: center;
            max-width: 400px;
            width: 90%;
            border: 2px solid #ff4b6e;
            position: relative;
            z-index: 10;
        }

        /* Animação do Coração do Topo */
        .coracao-topo {
            font-size: 50px;
            margin-bottom: 10px;
            display: inline-block;
            animation: pulsar 1.2s infinite;
        }

        h1 {
            font-size: 26px;
            color: #ff4b6e;
            margin-bottom: 15px;
        }

        .texto-pedido {
            font-size: 16px;
            line-height: 1.6;
            color: #cccccc;
            margin-bottom: 20px;
        }

        /* Frase de Efeito em Branco */
        .frase-efeito {
            font-weight: bold;
            font-size: 16px;
            color: #ffffff;
            margin-bottom: 30px;
        }

        /* Zona dos Botões */
        .botoes-container {
            display: flex;
            justify-content: space-around;
            align-items: center;
            gap: 15px;
            height: 50px;
            position: relative;
        }

        .btn {
            padding: 12px 30px;
            font-size: 16px;
            font-weight: bold;
            border-radius: 25px;
            cursor: pointer;
            border: none;
            transition: transform 0.2s, background-color 0.2s;
        }

        .btn:hover {
            transform: scale(1.05);
        }

        /* Botão SIM (Destaque Branco) */
        .btn-sim {
            background-color: #ffffff;
            color: #ff4b6e;
            box-shadow: 0 5px 15px rgba(255, 255, 255, 0.2);
        }

        .btn-sim:hover {
            background-color: #ffe6eb;
        }

        /* Botão NÃO (Preto Embutido) */
        .btn-nao {
            background-color: #2a2a2a;
            color: #888888;
            border: 1px solid #3a3a3a;
            z-index: 1000;
        }

        /* Animações Keyframes */
        @keyframes pulsar {
            0% { transform: scale(1); }
            50% { transform: scale(1.15); }
            100% { transform: scale(1); }
        }
    </style>
</head>
<body>

    <main class="card-pedido">
        <div class="coracao-topo">❤️</div>

        <div class="conteudo">
            <h1>Você aceita namorar comigo?</h1>
            
            <p class="texto-pedido">
                Desde que você entrou na minha vida, tudo ficou mais bonito, alegre e cheio de sentido. Não consigo mais imaginar o meu futuro sem o seu sorriso e sem a sua parceria. 
            </p>

            <p class="frase-efeito">Você aceita dar esse próximo passo juntos?</p>
            
            <div class="botoes-container">
                <button class="btn btn-sim" id="btnSim">SIM!</button>
                <button class="btn btn-nao" id="btnNao">Não</button>
            </div>
        </div>
    </main>

    <!-- Integração do Firebase (Módulos) -->
    <script type="module">
        import { initializeApp } from "https://gstatic.com";
        import { getFirestore, collection, addDoc, serverTimestamp } from "https://gstatic.com";

        // =========================================================
        // ATENÇÃO: SUBSTITUA OS DADOS ABAIXO PELOS DADOS DO SEU CONSOLE DO FIREBASE
        // =========================================================
        const firebaseConfig = {
        apiKey: "AIzaSyBpHGHpD04EQBKsyd3lZrmFZHvQxja2kvA",
        authDomain: "paulo-54b68.firebaseapp.com",
        projectId: "paulo-54b68",
        storageBucket: "paulo-54b68.firebasestorage.app",
        messagingSenderId: "769204790192",
        appId: "1:769204790192:web:b4cdc80f2c89289b7b6c75",
        measurementId: "G-CPMD83PDB9"
};

        // Inicializa o Firebase e o Firestore
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        let contagemFugas = 0;
        const btnSim = document.getElementById('btnSim');
        const btnNao = document.getElementById('btnNao');

        // Função para salvar a resposta no banco de dados
        async function salvarResposta(resultado) {
            try {
                await addDoc(collection(db, "respostas_pedido"), {
                    resposta: resultado,
                    data: serverTimestamp()
                });
                console.log("Resposta salva com sucesso!");
            } catch (error) {
                console.error("Erro ao salvar no Firebase:", error);
            }
        }

        // Evento de clique no SIM
        btnSim.addEventListener('click', async () => {
            alert("Ebaaaa! ❤️ Você me faz a pessoa mais feliz do mundo! Prometo te fazer muito feliz!");
            await salvarResposta("SIM");
        });

        // Evento de clique no NÃO
        btnNao.addEventListener('click', async () => {
            alert("Poxa... Que pena! 😢 Vou continuar torcendo por nós dois.");
            await salvarResposta("NAO");
        });

        // Lógica de fuga do botão Não
        btnNao.addEventListener('mouseover', () => {
            if (contagemFugas < 4) {
                contagemFugas++;
                const x = Math.random() * (window.innerWidth - btnNao.offsetWidth - 20);
                const y = Math.random() * (window.innerHeight - btnNao.offsetHeight - 20);
                
                btnNao.style.position = 'fixed';
                btnNao.style.left = x + 'px';
                btnNao.style.top = y + 'px';
            } else {
                btnNao.style.position = 'static';
                btnNao.style.cursor = 'pointer';
                btnNao.style.backgroundColor = '#1f1f1f';
                btnNao.style.color = '#444444';
                btnNao.style.borderColor = '#2a2a2a';
            }
        });
    </script>

</body>
</html>
