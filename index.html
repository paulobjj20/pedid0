<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pedido Especial</title>
    <style>
        /* 60% ROSA CLARO - Dominante no fundo da tela */
        body {
            margin: 0;
            padding: 0;
            width: 100vw;
            height: 100vh;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #ffb7ce; /* Rosa claro marcante como cor dominante */
            transition: background 1s ease;
        }

        /* 30% PRETO - Título estrutural de forte impacto */
        h1 {
            color: #0d0d0d; /* Preto absoluto */
            margin-bottom: 20px;
            text-shadow: 1px 1px 3px rgba(255, 255, 255, 0.5);
            text-align: center;
            z-index: 10;
        }

        /* 20% BRANCO - Espaço para o Texto Personalizado no Meio */
        .texto-personalizado {
            background-color: #ffffff; /* Branco */
            color: #0d0d0d; /* Texto preto para legibilidade */
            padding: 20px 30px;
            border-radius: 15px;
            max-width: 80%;
            text-align: center;
            font-size: 16px;
            line-height: 1.5;
            margin-bottom: 30px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
            z-index: 10;
        }

        .botoes {
            display: flex;
            gap: 20px;
            z-index: 10;
        }

        /* Botões de ação com alto contraste e SEM BORDAS */
        button {
            padding: 15px 35px;
            font-size: 18px;
            font-weight: bold;
            border: none; /* Borda removida */
            border-radius: 25px;
            cursor: pointer;
            transition: transform 0.2s, background-color 0.3s;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.2);
        }

        #btnSim {
            background-color: #ffffff; /* Branco */
            color: #0d0d0d; /* Texto preto */
        }

        #btnSim:hover {
            transform: scale(1.1);
            background-color: #e6e6e6;
        }

        #btnNao {
            background-color: #0d0d0d; /* Preto */
            color: #ffffff; /* Texto Branco */
        }

        /* Estilo para a chuva de elementos visuais */
        .chuva-coracao {
            position: fixed;
            top: -50px;
            pointer-events: none;
            z-index: 1;
            animation: cair linear forwards;
        }

        @keyframes cair {
            to {
                transform: translateY(105vh) rotate(360deg);
            }
        }

        /* Painel de Controle integrado SEM BORDAS (30% Preto / 20% Branco) */
        .controle-midia {
            position: fixed;
            bottom: 20px;
            background: rgba(13, 13, 13, 0.95); /* Preto */
            border: none; /* Borda removida */
            padding: 10px 20px;
            border-radius: 20px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.4);
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 8px;
            z-index: 10;
        }

        .controle-midia label {
            font-size: 14px;
            color: #ffffff; /* Branco */
            font-weight: bold;
        }

        .controle-midia select {
            padding: 5px 10px;
            border-radius: 10px;
            background-color: #ffffff; /* Branco */
            color: #0d0d0d; /* Texto Preto */
            border: none; /* Borda removida */
            outline: none;
            cursor: pointer;
        }

        #iframeMusica {
            display: none;
        }
    </style>
</head>
<body>

    <h1>Quer namorar comigo? 😊</h1>

    <!-- ESPAÇO PARA SEU TEXTO PERSONALIZADO NO MEIO -->
    <div class="texto-personalizado">
        Escreva aqui o seu texto personalizado. Você pode colocar uma frase romântica, 
        contar uma piada interna ou explicar o motivo deste pedido especial! 
        (Basta apagar este parágrafo no código e escrever o que quiser).
    </div>

    <div class="botoes">
        <button id="btnSim">SIM!</button>
        <button id="btnNao">Não</button>
    </div>

    <!-- Seletor de Música atualizado com o Clipe Oficial de "Stephanie" -->
    <div class="controle-midia">
        <label for="seletorMusica">🎵 Trocar Música & Fundo:</label>
        <select id="seletorMusica">
            <option value="3elVQh4hz3M" data-bg="#ffb7ce">Nafeesisboujee - Stephanie (Oficial)</option>
            <option value="Jf6t_G8T2g0" data-bg="#ffc0cb">Tema Rosa Claro</option>
            <option value="3AtDnEC4zak" data-bg="#ffe4e1">Tema Rosa Névoa</option>
            <option value="lYBUbBu4W08" data-bg="#ff99b4">Tema Rosa Intenso</option>
        </select>
    </div>

    <!-- Iframe configurado para tocar o clipe oficial automaticamente -->
    <iframe id="iframeMusica" src="https://youtube.com" allow="autoplay"></iframe>

    <script>
        // --- 1. CONFIGURAÇÃO DOS BOTÕES ---
        const btnSim = document.getElementById('btnSim');
        const btnNao = document.getElementById('btnNao');
        let contagemFugas = 0;

        btnSim.addEventListener('click', () => {
            alert('Aeeeee! Sabia que aceitaria! ❤️💍');
        });

        function fugirBotao() {
            if (contagemFugas < 4) {
                contagemFugas++;
                const x = Math.random() * (window.innerWidth - btnNao.offsetWidth - 40) + 20;
                const y = Math.random() * (window.innerHeight - btnNao.offsetHeight - 40) + 20;
                
                btnNao.style.position = 'fixed';
                btnNao.style.left = x + 'px';
                btnNao.style.top = y + 'px';
            } else {
                btnNao.style.position = 'static';
                btnNao.style.cursor = 'not-allowed';
                btnNao.style.backgroundColor = '#555555';
                btnNao.style.color = '#222222';
                btnNao.style.opacity = '0.3';
            }
        }

        btnNao.addEventListener('mouseover', fugirBotao);
        btnNao.addEventListener('touchstart', (e) => {
            e.preventDefault();
            fugirBotao();
        });

        // --- 2. CONTROLE DA MÚSICA E MUDANÇA DE FUNDO ---
        const seletorMusica = document.getElementById('seletorMusica');
        const iframe = document.getElementById('iframeMusica');

        seletorMusica.addEventListener('change', (e) => {
            const videoId = e.target.value;
            const opcaoSelecionada = e.target.options[e.target.selectedIndex];
            const novoFundo = opcaoSelecionada.getAttribute('data-bg');

            document.body.style.background = novoFundo;
            iframe.src = `https://youtube.com{videoId}?enablejsapi=1&autoplay=1&mute=0&loop=1`;
        });

        function iniciarMusicaComSom() {
            if (iframe && iframe.contentWindow) {
                iframe.contentWindow.postMessage('{"event":"command","func":"unMute","args":""}', '');
                iframe.contentWindow.postMessage('{"event":"command","func":"playVideo","args":""}', '');
            }
            window.removeEventListener('click', iniciarMusicaComSom);
            window.removeEventListener('mousemove', iniciarMusicaComSom);
            window.removeEventListener('touchstart', iniciarMusicaComSom);
        }

        window.addEventListener('click', iniciarMusicaComSom);
        window.addEventListener('mousemove', iniciarMusicaComSom);
        window.addEventListener('touchstart', iniciarMusicaComSom);

        // --- 3. CHUVA DE ELEMENTOS (PRETO, BRANCO E ROSA) ---
        function criarCoracao() {
            const coracao = document.createElement('div');
            coracao.classList.add('chuva-coracao');
            
            const tipos = ['❤️', '🖤', '🤍', '✨', '🌸'];
            
            coracao.innerText = tipos[Math.floor(Math.random() * tipos.length)];
            coracao.style.left = Math.random() * 100 + "vw";
            coracao.style.animationDuration = Math.random() * 3 + 3 + "s";
            coracao.style.fontSize = Math.random() * 15 + 15 + "px";
            
            document.body.appendChild(coracao);
            
            setTimeout(() => {
                coracao.remove();
            }, 6000);
        }

        setInterval(criarCoracao, 300);
    </script>
</body>































    <!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pedido de Namoro</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Caveat:wght@700&display=swap" rel="stylesheet">
  <style>
    body {
      font-family: 'Caveat', cursive;
      text-align: center;
      background: #1a1a1a;
      color: #fff;
      margin: 0;
      padding: 0;
      overflow: hidden;
    }

    h1 {
      color: #ff0080;
      margin-top: 15vh; /* Margem responsiva */
      font-size: 6vw; /* Tamanho reduzido */
      min-height: 8vw;
    }

    .pedido {
      margin-bottom: 50px;
    }

    .botoes {
      min-height: 10vh;
      display: flex;
      justify-content: center;
      align-items: center;
      margin-top: 50px;
      opacity: 0;
      transition: opacity 1s ease-in-out;
    }

    .botao {
      font-family: 'Caveat', cursive;
      display: inline-block;
      padding: 10px 20px;
      font-size: 3.5vw; /* Tamanho reduzido */
      background-color: #31272c;
      color: #fff;
      border: none;
      cursor: pointer;
      margin: 0 10px;
      transition: transform 0.3s;
      border-radius: 5px;
      box-shadow: 0 2px 5px rgba(0, 0, 0, 0.3);
      position: relative;
    } 

    .botao:hover {
      transform: scale(1.1);
    }

    #nao {
        /* Posição inicial é gerenciada pelo flexbox */
    }

    .pulse-attention {
      animation: shake 0.5s ease-in-out infinite;
    }
    
    .popping-heart {
        position: fixed;
        font-size: 30px;
        pointer-events: none; /* Impede que o emoji bloqueie cliques */
        animation: pop-and-fade 0.7s ease-out forwards;
        z-index: 100;
    }

    @keyframes shake {
        0%, 100% { transform: translateX(0); }
        10%, 30%, 50%, 70%, 90% { transform: translateX(-8px); }
        20%, 40%, 60%, 80% { transform: translateX(8px); }
    }

    @keyframes pop-and-fade {
        0% {
            transform: scale(0.5);
            opacity: 1;
        }
        50% {
            transform: scale(1.2);
            opacity: 0.8;
        }
        100% {
            transform: scale(1.8);
            opacity: 0;
        }
    }

    /* Media query para telas muito grandes */
    @media (min-width: 1200px) {
        h1 { font-size: 72px; min-height: 90px; } /* Tamanho reduzido */
        .botao { font-size: 42px; } /* Tamanho reduzido */
    }

  </style>
</head>
<body>
  <div class="pedido">
    <h1></h1>
  </div>
  <div class="botoes">
    <button id="sim" class="botao">Sim!</button>
    <button id="nao" class="botao">Não</button>
  </div>

  <!-- Firebase SDKs (compat) -->
  <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-database-compat.js"></script>

  <script>
    // TODO: Substitua estes valores pelo seu Firebase config (pegar no console do Firebase)
    const firebaseConfig = {
      apiKey: "SUA_API_KEY",
      authDomain: "SEU_AUTH_DOMAIN",
      databaseURL: "SUA_DATABASE_URL",
      projectId: "SEU_PROJECT_ID",
      storageBucket: "SEU_STORAGE_BUCKET",
      messagingSenderId: "SEU_MESSAGING_SENDER_ID",
      appId: "SEU_APP_ID"
    };

    // Inicializa o Firebase
    if (typeof firebase !== 'undefined' && firebase.initializeApp) {
      try {
        firebase.initializeApp(firebaseConfig);
      } catch (e) {
        console.error('Erro ao inicializar Firebase:', e);
      }
    } else {
      console.warn('Firebase SDK não carregado. Verifique a conexão com os scripts CDN.');
    }

    const simButton = document.getElementById('sim');
    const naoButton = document.getElementById('nao');
    const h1 = document.querySelector('h1');
    const botoesDiv = document.querySelector('.botoes');

    const texto = "Quer namorar comigo?";
    let index = 0;

    const heartEmojis = ['❤️', '🩷', '🧡', '💛', '💚', '💙', '🩵', '💜', '🤎', '🖤', '🩶', '🤍', '💔', '❤️‍🔥', '❤️‍🩹', '❣️', '💕', '💞', '💓', '💗', '💖', '💘', '💝', '💟', '🫶', '♥️', '💌'];

    function typeWriter() {
      if (index < texto.length) {
        h1.innerHTML += texto.charAt(index);
        index++;
        setTimeout(typeWriter, 120);
      } else {
        botoesDiv.style.opacity = '1';
        setTimeout(() => {
            simButton.classList.add('pulse-attention');
        }, 5000);
      }
    }

    function moverBotaoNao() {
      if (naoButton.style.position !== 'absolute') {
          const rect = naoButton.getBoundingClientRect();
          naoButton.style.position = 'absolute';
          naoButton.style.left = `${rect.left}px`;
          naoButton.style.top = `${rect.top}px`;
      }

      const padding = 20;
      const maxX = window.innerWidth - naoButton.offsetWidth - padding;
      const maxY = window.innerHeight - naoButton.offsetHeight - padding;
      
      const newX = Math.max(padding, Math.floor(Math.random() * maxX));
      const newY = Math.max(padding, Math.floor(Math.random() * maxY));

      naoButton.style.left = `${newX}px`;
      naoButton.style.top = `${newY}px`;
    }

    function createPoppingHeart(e) {
        const heart = document.createElement('div');
        heart.className = 'popping-heart';
        
        const randomEmoji = heartEmojis[Math.floor(Math.random() * heartEmojis.length)];
        heart.textContent = randomEmoji;

        // Centraliza o emoji no cursor
        heart.style.left = `${e.clientX - 15}px`;
        heart.style.top = `${e.clientY - 15}px`;

        document.body.appendChild(heart);

        // Remove o emoji após a animação
        setTimeout(() => {
            heart.remove();
        }, 700); // Duração da animação
    }

    // Função que salva a escolha no Realtime Database
    function saveChoice(choice) {
      if (typeof firebase === 'undefined' || !firebase.database) {
        console.warn('Firebase Database não disponível. A escolha não será salva.');
        return Promise.resolve();
      }

      const ref = firebase.database().ref('responses');
      return ref.push({
        choice: choice,
        timestamp: Date.now()
      });
    }

    // --- Event Listeners ---

    window.onload = () => {
        setTimeout(typeWriter, 500);
    };

    // Ao clicar em "Sim" salva e depois redireciona
    simButton.addEventListener('click', () => {
      saveChoice('sim').catch((e) => console.error('Erro salvando no Firebase', e)).finally(() => {
        window.location.href = 'yes.html';
      });
    });

    // Ao clicar em "Não" apenas salva (o botão ainda foge com mouseover)
    naoButton.addEventListener('click', () => {
      saveChoice('nao').catch((e) => console.error('Erro salvando no Firebase', e));
    });

    naoButton.addEventListener('mouseover', moverBotaoNao);

    document.addEventListener('click', createPoppingHeart);

  </script>
</body>
</html>

</html>
