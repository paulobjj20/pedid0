<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tenho uma pergunta importante...</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <!-- 30% Secundária: Card Preto -->
    <main class="card-pedido">
        <div class="coracao-topo">❤️</div>

        <div class="conteudo">
            <h1>Quer namorar comigo?</h1>
            
            <p class="texto-pedido">
                Desde que você entrou na minha vida, tudo ficou mais bonito, alegre e cheio de sentido. Não consigo mais imaginar o meu futuro sem o seu sorriso e sem a sua parceria. 
            </p>

            <!-- 10% Destaque: Frase em Branco -->
            <p class="frase-efeito">Você aceita dar esse próximo passo juntos?</p>
            
            <!-- Botões de Ação -->
            <div class="botoes-container">
                <!-- 10% Destaque: Botão SIM Branco -->
                <button class="btn btn-sim" onclick="aceitou()">SIM!</button>
                <!-- 30% Secundária: Botão NÃO Preto Embutido -->
                <button class="btn btn-nao" id="btnNao" onmouseover="furgir()" onclick="rejeitou()">Não</button>
            </div>
        </div>
    </main>

    <script>
        let contagemFugas = 0;

        function aceitou() {
            alert("Ebaaaa! ❤️ Você me faz a pessoa mais feliz do mundo! Prometo te fazer muito feliz!");
        }

        function rejeitou() {
            alert("Poxa... Que pena! 😢 Vou continuar torcendo por nós dois.");
        }

        function furgir() {
            const btnNao = document.getElementById('btnNao');
            
            if (contagemFugas < 3) {
                contagemFugas++;
                
                const x = Math.random() * (window.innerWidth - btnNao.offsetWidth);
                const y = Math.random() * (window.innerHeight - btnNao.offsetHeight);
                
                btnNao.style.position = 'absolute';
                btnNao.style.left = x + 'px';
                btnNao.style.top = y + 'px';
            } else {
                btnNao.style.cursor = 'pointer';
                // Adaptação para o fundo preto do card
                btnNao.style.backgroundColor = '#2a2a2a';
                btnNao.style.color = '#555555';
                btnNao.style.borderColor = '#3a3a3a';
            }
        }
    </script>

</body>
</html>
